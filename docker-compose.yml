services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: orthanc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: orthanc_db
    volumes:
      - ./pacs_data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orthanc -d orthanc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  orthanc:
    image: orthancteam/orthanc:latest
    restart: always
    ports:
      - "${ORTHANC_PORT:-8042}:8042"
      - "${DICOM_PORT:-4242}:4242"
    environment:
      - POSTGRES_USER=orthanc
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=orthanc_db
      - POSTGRES_HOST=db
    volumes:
      - ./config/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./pacs_data/orthanc:/var/lib/orthanc/db
      - ./pacs_data/worklists:/worklists
    depends_on:
      db:
        condition: service_healthy

  ohif:
    image: ohif/viewer:latest
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./config/app-config.js:/usr/share/nginx/html/app-config.js:ro
      - ./config/ohif-custom.css:/usr/share/nginx/html/ohif-custom.css:ro
      - ./config/ohif-custom.js:/usr/share/nginx/html/ohif-custom.js:ro
      - ./config/ohif-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard/public/favicon.svg:/usr/share/nginx/html/favicon.ico:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        sed -i "s|https://[^\"']*polyfill\.io[^\"']*|https://cdnjs.cloudflare.com/ajax/libs/polyfill/3.41.0/polyfill.min.js|g" /usr/share/nginx/html/index.html
        sed -i "/ohif-custom\.css/d" /usr/share/nginx/html/index.html
        sed -i "/ohif-custom\.js/d" /usr/share/nginx/html/index.html
        sed -i "s|</head>|<link rel=\"stylesheet\" href=\"/ohif-custom.css?v=mpacs-20260623-rootguard\"></head>|" /usr/share/nginx/html/index.html
        sed -i "s|</body>|<script src=\"/ohif-custom.js?v=mpacs-20260623-rootguard\"></script></body>|" /usr/share/nginx/html/index.html
        nginx -g 'daemon off;'
    depends_on:
      - orthanc

  dashboard:
    build:
      context: ./dashboard
    restart: always
    ports:
      - "80:3000"
    command: sh -c "./node_modules/.bin/prisma db push --skip-generate && node prisma/seed.js && npm start"
    environment:
      - NEXT_PUBLIC_OHIF_URL=http://${SERVER_IP}:3000
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin@123}
      - ORTHANC_API_URL=http://orthanc:8042
      - ORTHANC_USERNAME=${ORTHANC_ADMIN_USER}
      - ORTHANC_PASSWORD=${ORTHANC_ADMIN_PASSWORD}
      - DATABASE_URL=postgresql://orthanc:${POSTGRES_PASSWORD}@db:5432/orthanc_db?schema=dashboard
    volumes:
      - ./pacs_data/report_images:/app/pacs_data/report_images
      - ./pacs_data/worklists:/app/pacs_data/worklists
    depends_on:
      db:
        condition: service_healthy
      orthanc:
        condition: service_started

