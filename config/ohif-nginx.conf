server {
  listen 80;

  location = /app-config.js {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /app-config.js =404;
  }

  location = /ohif-custom.css {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /ohif-custom.css =404;
  }

  location = /ohif-custom.js {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /ohif-custom.js =404;
  }

  location = /index.html {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /index.html =404;
  }

  # Serve OHIF static files
  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy to Orthanc DICOMweb API
  # This eliminates all CORS issues because browser sees same-origin
  location /dicom-web {
    proxy_pass http://orthanc:8042/dicom-web;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 0;
  }

  # Reverse proxy Orthanc WADO-URI
  location /wado {
    proxy_pass http://orthanc:8042/wado;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    client_max_body_size 0;
  }

  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }
}
