[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224

[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       json
    Reserve_Data On

[FILTER]
    Name         grep
    Match        *
    # Ignore noisy health check logs
    Exclude      log /healthz

[OUTPUT]
    Name         datadog
    Match        *
    Host         http-intake.logs.datadoghq.com
    TLS          on
    compress     gzip
    apikey       ${DATADOG_API_KEY}
    dd_service   minipacs-dashboard
    dd_source    nodejs
    dd_tags      env:production,team:medical
